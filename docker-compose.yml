version: '3.9'

services:

  postgres:
    image: postgres:15
    container_name: orders_postgres
    environment:
      POSTGRES_DB: ordersdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: orders_rabbitmq
    ports:
        - "5672:5672"
        - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 30s
      retries: 10

  orders-api:
    build:
        context: .
        dockerfile: src/OrderService.Api/Dockerfile
    container_name: orders_api
    depends_on:
        postgres:
          condition: service_healthy
        rabbitmq:
          condition: service_healthy
    ports:
        - "5000:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Development

  orders-worker:
    build:
        context: .
        dockerfile: src/OrderService.Worker/Dockerfile
    container_name: orders_worker
    depends_on:
        rabbitmq:
          condition: service_healthy
        postgres:
          condition: service_healthy 

volumes:
  postgres_data: